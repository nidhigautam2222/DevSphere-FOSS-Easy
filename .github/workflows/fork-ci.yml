name: Fork CI

# ─────────────────────────────────────────────────────────────
#  Runs on every push in the participant's fork (all branches).
#  Gives early feedback BEFORE they open a PR.
#  Uses the participant's own GitHub Actions minutes.
# ─────────────────────────────────────────────────────────────
on:
  push:

jobs:
  # ── 1. Tests ────────────────────────────────────────────────
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.tests.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Restore protected sample files from origin/main so
      # participants cannot tamper with expected outputs.
      - name: Restore sample files from main
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- samples/

      - name: Run test suite
        id: tests
        run: |
          chmod +x tests/run_tests.sh
          if bash tests/run_tests.sh; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

  # ── 2. Read-only file check ─────────────────────────────────
  check-readonly:
    name: Read-Only Files
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.check.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for read-only violations
        id: check
        run: |
          git fetch origin main --depth=1

          VIOLATIONS=""
          while IFS= read -r entry; do
            # Strip Windows-style CR if the file has CRLF line endings
            entry="${entry%$'\r'}"
            # Skip blank lines and comments
            [[ -z "$entry" || "$entry" == \#* ]] && continue
            if ! git diff --quiet origin/main HEAD -- "$entry" 2>/dev/null; then
              VIOLATIONS="$VIOLATIONS\n  - $entry"
            fi
          done < .readonly-files

          if [[ -n "$VIOLATIONS" ]]; then
            echo "The following protected files were modified:"
            printf '%b\n' "$VIOLATIONS"
            echo "passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "No protected files modified."
          echo "passed=true" >> "$GITHUB_OUTPUT"

  # ── 3. Commit verification (FOSS repos only) ────────────────
  #
  #  This check only activates when TARGET_COMMIT_HASH is set in
  #  the MAIN repository's secrets (set by organizers, not participants).
  #  On participant forks this step is silently skipped — the secret
  #  lives only in the main repo and is never visible to participants.
  check-commit:
    name: Commit Verification (FOSS)
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.check.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify commit hash
        id: check
        env:
          TARGET_COMMIT: ${{ secrets.TARGET_COMMIT_HASH }}
        run: |
          if [[ -z "$TARGET_COMMIT" ]]; then
            echo "TARGET_COMMIT_HASH not set — skipping (non-FOSS or not yet configured)."
            echo "passed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin main --depth=1
          COMMIT_COUNT=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo "0")
          HEAD=$(git rev-parse HEAD)
          PARENT=$(git rev-parse HEAD^ 2>/dev/null || echo "")

          if [[ "$COMMIT_COUNT" == "1" ]] && \
             { [[ "$HEAD" == "$TARGET_COMMIT" ]] || [[ "$PARENT" == "$TARGET_COMMIT" ]]; }; then
            echo "Commit hash verified."
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Commit hash mismatch (commits ahead of main: $COMMIT_COUNT)."
            echo "Hint: version control is a time machine!"
            echo "passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

  # ── 4. Summary ──────────────────────────────────────────────
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [run-tests, check-readonly, check-commit]
    if: always()
    steps:
      - name: Report
        run: |
          echo "Tests:       ${{ needs.run-tests.outputs.passed }}"
          echo "Read-only:   ${{ needs.check-readonly.outputs.passed }}"
          echo "Commit hash: ${{ needs.check-commit.outputs.passed }}"

          ALL_PASS=true
          [[ "${{ needs.run-tests.outputs.passed }}"    != "true" ]] && ALL_PASS=false
          [[ "${{ needs.check-readonly.outputs.passed }}" != "true" ]] && ALL_PASS=false
          [[ "${{ needs.check-commit.outputs.passed }}"  != "true" ]] && ALL_PASS=false

          if [[ "$ALL_PASS" == "true" ]]; then
            echo ""
            echo "All checks passed — you may open a PR to the main repo."
          else
            echo ""
            echo "One or more checks failed — fix the issues before opening a PR."
            exit 1
          fi
